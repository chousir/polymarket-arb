# Ensemble 機率版：直接用 50+ 成員統計 p_yes（高流動性城市優先）
[[strategies]]
id                          = "weather_ensemble_prob"
type                        = "weather"
enabled                     = true
capital_allocation_pct      = 0.10
trade_size_pct              = 0.05
max_drawdown_pct            = 0.25
taker_fee_bps               = 180.0
slippage_buffer_bps         = 40.0
min_net_edge_bps            = 650.0
max_spread                  = 0.06
stop_loss_delta             = 0.12
min_model_confidence        = 0.63            # 現在 30 成員機率有意義
