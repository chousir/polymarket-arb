# 多模型共識版：僅在 GFS/ECMWF/Ensemble 三者分歧 < 10% 時進場
# A/B 測試 A 組（保守）：高邊際 + 高信心 + 嚴格流動性
[[strategies]]
id                          = "weather_multi_consensus_conservative"
type                        = "weather"
enabled                     = true
