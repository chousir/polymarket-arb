# ── MetarShort 模型 custom（取代 weather_metar_short）───────────────────────────
# 即時 METAR 觀測（lead_days=0 時直接使用實測溫度），最適合當日或隔日到期市場。
# lead_days=0：直接讀 METAR 觀測值，σ=2.5°C（比預報更確定）
# 無集成成員 → Gate 4 自動略過
# loop_interval_sec=300：短線需更頻繁掃描（5 分鐘/次）
[[strategies]]
id                                      = "weather_custom_metar"
type                                    = "weather_customized"
enabled                                 = true
capital_allocation_pct                  = 0.05
trade_size_pct                          = 0.05
max_drawdown_pct                        = 0.18
loop_interval_sec                       = 300               # 短線市場需 5 分鐘掃描

taker_fee_bps                           = 180.0
slippage_buffer_bps                     = 50.0              # 短線流動性較差，保留緩衝
min_net_edge_bps                        = 500.0             # 短線市場費用比例高，需更高邊際
max_spread                              = 0.06
min_model_confidence                    = 0.70              # METAR 同日精度高，可要求更高信心
min_model_confidence_temprange          = 0.70
weather_min_depth_usdc                  = 60.0
weather_min_lead_days                   = 0                 # 當日市場（METAR 直接觀測）
weather_max_lead_days                   = 1
city_whitelist                          = []                # 所有支援且有 ICAO 代碼的城市
weather_forecast_model                  = "metar_short"
forecast_shift_threshold                = 0.08              # 同日觀測更可靠，偏移門檻低
# METAR σ=2.5°C 下，1°C TempRange bucket 的最大 p_yes ≈ 0.20（完美預測中心）
# 因此 min_temprange_p_yes=0.26 實際封鎖了 TempRange BUY_YES，只保留 BUY_NO 和 Extreme ← 正確行為
min_temprange_p_yes                     = 0.26
stop_loss_delta                         = 0.10
min_sl_ticks                            = 2
high_yes_ask_threshold                  = 0.35
high_yes_min_confidence_no              = 0.85

customized_lookback_ticks               = 3                 # 短線歷史較短（3×5min=15min）
customized_min_slope                    = 0.0
customized_min_history_ticks            = 2                 # 短線允許較少歷史才算斜率
customized_min_entry_price              = 0.30
customized_max_entry_price              = 0.85
customized_max_ensemble_spread_celsius  = 4.0               # metar_short 無集成成員，此參數不生效
customized_max_positions_per_city       = 2
