max_drawdown_pct            = 0.20
taker_fee_bps               = 180.0
slippage_buffer_bps         = 40.0
min_net_edge_bps            = 300.0            # 修復：原 650 + cost×2 = 10.9% 門檻不可達，改為 300bps
max_spread                  = 0.06
stop_loss_delta             = 0.09             # 比 low 稍緊，但仍給足緩衝
min_model_confidence        = 0.65
weather_min_depth_usdc      = 50.0
weather_min_lead_days       = 1
weather_max_lead_days       = 5                # GFS 5天內精度最佳
city_whitelist              = ["NYC", "London", "Miami", "Chicago", "LA", "Houston", "Dallas", "Boston", "Seattle", "Atlanta"]
weather_forecast_model      = "gfs"
forecast_shift_threshold    = 0.15             # GFS 每6h更新，比NWS穩定，0.12→0.15
min_temprange_p_yes         = 0.26

