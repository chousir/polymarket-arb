# ═══════════════════════════════════════════════════════════════════════════════
# Weather Ladder 系列（Phase 5b）
# ───────────────────────────────────────────────────────────────────────────────
# type = "weather_ladder"：掃描連續精確溫度市場的低價群集，同時買入多腿，
#   以高賠率（80x–500x）等待到期收割。
#
# 核心邏輯：
#   sum_prices = 所有腿的入場價加總
#   payout_ratio = 1 / sum_prices（只需一腿中獎即回本）
#   combined_p_yes = GFS 預測各腿 p_yes 的總和（衡量至少一腿中獎的機率）
#
# 入場條件（全部須成立）：
#   1. payout_ratio >= ladder_min_payout_ratio
#   2. combined_p_yes >= ladder_min_combined_p_yes
#   3. 每腿 ask 在 [ladder_min_leg_price, ladder_max_leg_price] 區間內
#   4. 相鄰腿溫度差 <= 3°C（硬碼）
#   5. 腿數 >= ladder_min_legs
#
# 平倉條件：
#   HOLD_TO_RESOLUTION — 等市場到期，收割獲勝腿的 $1.00
#   CATASTROPHIC_SHIFT_EXIT — GFS 預測 combined_p 下降超過 ladder_catastrophic_shift_threshold
#
# 參數說明：
#   ladder_min_leg_price              — 每腿最低入場價（過低可能無流動性）
#   ladder_max_leg_price              — 每腿最高入場價（過高則賠率不足）
#   ladder_min_payout_ratio           — 最低要求賠率（倍數，1/sum_prices）
#   ladder_min_combined_p_yes         — GFS 最低預測勝率（防止賭不可能的事件）
#   ladder_min_legs / ladder_max_legs — 群集腿數範圍
#   ladder_max_total_usdc             — 單次進場最大金額（所有腿合計）
#   ladder_catastrophic_shift_threshold — GFS combined_p 下降此幅度即強制出場
# ═══════════════════════════════════════════════════════════════════════════════

# 驗證版：保守參數，高賠率要求，低資金，確認策略機制正常
[[strategies]]
id                                  = "weather_ladder_validate"
type                                = "weather_ladder"
enabled                             = false
capital_allocation_pct              = 0.03              # 只用 3% 總資金驗證
trade_size_pct                      = 0.05
max_drawdown_pct                    = 0.25
weather_min_lead_days               = 1
weather_max_lead_days               = 7
loop_interval_sec                   = 900               # 每 15 分鐘掃描一次
ladder_min_leg_price                = 0.0010            # 最低 $0.001/腿
ladder_max_leg_price                = 0.0200            # 最高 $0.02/腿（100x+ 潛力）
ladder_min_payout_ratio             = 80.0              # 至少 80 倍賠率
ladder_min_combined_p_yes           = 0.20              # GFS 至少 20% 總勝率
ladder_min_legs                     = 3
ladder_max_legs                     = 7
ladder_max_total_usdc               = 3.0               # 單梯最大 $3（小倉驗證）
ladder_catastrophic_shift_threshold = 0.35              # GFS 預測大跌 35% 才出場

# 標準版：放寬入場，提升進場頻率，適度增加資金
[[strategies]]
id                                  = "weather_ladder_standard"
type                                = "weather_ladder"
enabled                             = false
capital_allocation_pct              = 0.05
trade_size_pct                      = 0.05
max_drawdown_pct                    = 0.25
weather_min_lead_days               = 1
weather_max_lead_days               = 10
loop_interval_sec                   = 600               # 每 10 分鐘掃描
ladder_min_leg_price                = 0.0005
ladder_max_leg_price                = 0.0500            # 放寬至 $0.05（20x+ 賠率）
ladder_min_payout_ratio             = 40.0              # 降至 40 倍，進場更多機會
ladder_min_combined_p_yes           = 0.25
ladder_min_legs                     = 3
ladder_max_legs                     = 9
ladder_max_total_usdc               = 8.0
ladder_catastrophic_shift_threshold = 0.30

# 進取版：低賠率門檻，高進場頻率，需 ≥ 14 天正收益後才啟用
[[strategies]]
id                                  = "weather_ladder_aggressive"
type                                = "weather_ladder"
enabled                             = false             # 待驗證版穩定後再啟用
capital_allocation_pct              = 0.05
trade_size_pct                      = 0.05
max_drawdown_pct                    = 0.30
weather_min_lead_days               = 1
weather_max_lead_days               = 14
loop_interval_sec                   = 600
ladder_min_leg_price                = 0.0003
ladder_max_leg_price                = 0.1000            # 接受至 $0.10（10x 賠率）
ladder_min_payout_ratio             = 15.0
ladder_min_combined_p_yes           = 0.30
ladder_min_legs                     = 2
ladder_max_legs                     = 12
ladder_max_total_usdc               = 15.0
ladder_catastrophic_shift_threshold = 0.25

# ═══════════════════════════════════════════════════════════════════════════════
# Weather Customized 系列（Phase 5c）
# ───────────────────────────────────────────────────────────────────────────────
# type = "weather_customized"：可配置任意預測模型 + 七道進場閘門的穩健版天氣策略。
# weather_forecast_model 可設為：gfs / nws / ecmwf / ensemble / consensus / metar_short
#
# 七道進場閘門：
#   [閘門 1] LOOKBACK_SLOPE      — 近 N tick 報價斜率 ≥ customized_min_slope
#   [閘門 2] MIN_ENTRY_PRICE     — token ask ≥ customized_min_entry_price（預設 0.30）
#   [閘門 3] MAX_ENTRY_PRICE     — token ask ≤ customized_max_entry_price（預設 0.85）
#   [閘門 4] ENSEMBLE_SPREAD     — Ensemble 成員溫度標準差 ≤ customized_max_ensemble_spread_celsius
#                                  （非 Ensemble/Consensus 模型自動略過，Consensus 由內部 chaos check 取代）
#   [閘門 5] CITY_EXPOSURE       — 同城市持倉數 < customized_max_positions_per_city
#   [閘門 6] PEAK_BUCKET_BLOCK   — 同城市+日期最高流動性桶不做 BuyNo（逆市場保護）
#   [閘門 7] HIGH_YES_CONFIDENCE — YES ask ≥ high_yes_ask_threshold 時，BuyNo 需更高模型信心
#
# 各閘門調參指引：
#   customized_min_slope：
#     0.0   = 只排除持續下跌市場（最寬鬆，接近不過濾）
#     0.001 = 每 tick 漲 ≥ 0.1¢（約 15min × 4 tick = 0.4¢/h）
#     0.003 = 每 tick 漲 ≥ 0.3¢（明顯上升趨勢才進場）
#   customized_max_ensemble_spread_celsius：
#     4.0   = 寬鬆（多數市場可通過，預設）
#     3.0   = 中等（過濾高不確定性）
#     2.0   = 嚴格（僅最確定的預報）
#   customized_max_entry_price：
#     0.85  = 預設（費用 3.6% 後還有 11.4% 上升空間）
#     0.80  = 確保入場後至少有 16.4% 獲利空間
#     0.70  = 只買明顯低估的 token（最保守）
# ═══════════════════════════════════════════════════════════════════════════════

# ── 驗證版（灰度啟用，確認機制正常）────────────────────────────────────────────
# 參數最嚴格：高信心門檻、要求上升斜率、窄入場價格帶
[[strategies]]
id                                      = "weather_custom_verify"
type                                    = "weather_customized"
enabled                                 = true               # Ensemble 模型驗證版（灰度啟用）
capital_allocation_pct                  = 0.05              # 使用 5% 總資金（灰度）
trade_size_pct                          = 0.05              # 每次只用 3%（小倉驗證）
max_drawdown_pct                        = 0.30              # 嚴格停損
loop_interval_sec                       = 900               # 每 15 分鐘掃描

# ── Ensemble 信心參數 ─────────────────────────────────────────────────────────
taker_fee_bps                           = 180.0
slippage_buffer_bps                     = 45.0
min_net_edge_bps                        = 450.0             # 高邊際要求
max_spread                              = 0.05
min_model_confidence                    = 0.70              # BuyNo 模型信心門檻（(1-p_yes) ≥ 0.70）
min_model_confidence_temprange          = 0.70              # TempRange BuyNo 同上（顯式設定，避免靜默 fallback）
min_ensemble_members                    = 20                # 至少 20 個有效成員（共 30 員，需 67% 有效）
weather_min_depth_usdc                  = 60.0
weather_min_lead_days                   = 1
weather_max_lead_days                   = 5
# 城市白名單：已確認 Polymarket 結算站 + 主要 Ensemble 覆蓋城市
# NYC=KLGA、London=EGLC、Tokyo=RJTT、Paris=LFPB、Toronto=CYYZ（wunderground 確認）
# LA=KLAX、Miami=KMIA、Chicago=KORD、Sydney=YSSY、Seoul=RKSS、Dubai=OMDB
city_whitelist                          = ["NYC", "London", "Tokyo", "Miami", "Chicago", "Paris", "Toronto", "LA", "Sydney", "Seoul", "Dubai", "Houston", "Boston", "Dallas", "Berlin", "Amsterdam"]
weather_forecast_model                  = "ensemble"
forecast_shift_threshold                = 0.15
# Ensemble 走成員計票路徑，min_temprange_p_yes 不生效（binding 條件為 min_model_confidence = 0.70）
min_temprange_p_yes                     = 0.26
stop_loss_delta                         = 0.12
# profit_target 由程式碼動態計算：(taker_fee×2 + slippage×2 + min_edge×0.5) / 10000 ≈ 0.0675
# 此參數不寫入 settings.toml（StrategyConfig 未定義此欄位，寫了也不會被讀取）
min_sl_ticks                            = 2                 # 需連續 2 tick 才觸發止損

# ── High-YES 市場保護 ─────────────────────────────────────────────────────────
# 當市場 YES ask >= threshold，BuyNo 的模型信心要求從 0.70 提升到 high_yes_min_confidence_no
# 防止在市場高度看好某桶時逆市場下 NO（例如 YES=50% 但模型說 25%，gap 不夠可靠）
high_yes_ask_threshold                  = 0.35
high_yes_min_confidence_no              = 0.85

# ── Customized 閘門 ───────────────────────────────────────────────────────────
customized_lookback_ticks               = 4                 # 保留最近 4 tick（≈60min）歷史
customized_min_slope                    = 0.001             # 每 tick 至少漲 0.1¢（過濾震盪）
customized_min_history_ticks            = 3                 # 歷史不足 3 tick 時略過斜率閘
customized_min_entry_price              = 0.30              # 不買廉價低流動性 token
customized_max_entry_price              = 0.90              # 放寬上限：高定價 NO 若 EV 為正仍可進
customized_max_ensemble_spread_celsius  = 3.0               # 成員分歧 ≤ 3°C
customized_max_positions_per_city       = 2                 # 同城市最多 2 倉（峰值桶保護另外攔截）

# ── 標準版（驗證版穩定 7 天後啟用）────────────────────────────────────────────
# 放寬斜率與入場價格範圍，提升進場頻率，增加資金
