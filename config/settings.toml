weather_forecast_model                  = "ensemble"
forecast_shift_threshold                = 0.15
# Ensemble 走成員計票路徑，min_temprange_p_yes 不生效（binding 條件為 min_model_confidence）
min_temprange_p_yes                     = 0.26
forecast_temp_bias_celsius              = 1.5
stop_loss_delta                         = 0.12
# profit_target 由程式碼動態計算，不寫此欄（StrategyConfig 無此欄位，寫了不被讀取）
