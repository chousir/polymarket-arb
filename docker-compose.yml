name: polymarket-arb

services:
  # ════════════════════════════════════════════════════════════════════════════
  # Polymarket 核心引擎（Rust）
  # ════════════════════════════════════════════════════════════════════════════
  engine:
    image: polymarket-arb-app:latest
    container_name: polymarket-engine
    environment:
      TRADING_MODE: ${TRADING_MODE:-dry_run}
      SERVICE_MODE: 0  # 只運行引擎
      DB_PATH: /app/data/market_snapshots.db
      RUST_LOG: ${RUST_LOG:-info,polymarket_engine=debug}
      POLYGON_PRIVATE_KEY: ${POLYGON_PRIVATE_KEY:-}
      POLYGON_PUBLIC_KEY: ${POLYGON_PUBLIC_KEY:-}
      CLOB_API_KEY: ${CLOB_API_KEY:-}
      CLOB_API_SECRET: ${CLOB_API_SECRET:-}
      CLOB_API_PASSPHRASE: ${CLOB_API_PASSPHRASE:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      CONFIRM_LIVE: ${CONFIRM_LIVE:-}

    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro

    networks:
      - polymarket-net

    restart: on-failure:5

    profiles:
      - engine
      - all

  # ════════════════════════════════════════════════════════════════════════════
  # Python 儀表板 + 分析層
  # ════════════════════════════════════════════════════════════════════════════
  dashboard:
    image: polymarket-arb-app:latest
    container_name: polymarket-dashboard
    environment:
      DB_PATH: /app/data/market_snapshots.db
      SERVICE_MODE: 1  # 只運行儀表板

    volumes:
      - ./data:/app/data:ro
      - ./config:/app/config:ro

    ports:
      - "${DASHBOARD_PORT:-8080}:8080"

    networks:
      - polymarket-net

    restart: unless-stopped

    profiles:
      - dashboard
      - all

  # ════════════════════════════════════════════════════════════════════════════
  # 整合服務（Rust 引擎 + 儀表板）—— 也是唯一的 build 來源
  # ════════════════════════════════════════════════════════════════════════════
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: polymarket-arb-app:latest
    container_name: polymarket-app
    environment:
      TRADING_MODE: ${TRADING_MODE:-dry_run}
      SERVICE_MODE: 2  # 同時啟動引擎 + 儀表板
      DB_PATH: /app/data/market_snapshots.db
      RUST_LOG: ${RUST_LOG:-info,polymarket_engine=debug}
      POLYGON_PRIVATE_KEY: ${POLYGON_PRIVATE_KEY:-}
      POLYGON_PUBLIC_KEY: ${POLYGON_PUBLIC_KEY:-}
      CLOB_API_KEY: ${CLOB_API_KEY:-}
      CLOB_API_SECRET: ${CLOB_API_SECRET:-}
      CLOB_API_PASSPHRASE: ${CLOB_API_PASSPHRASE:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      CONFIRM_LIVE: ${CONFIRM_LIVE:-}

    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro

    ports:
      - "${DASHBOARD_PORT:-8080}:8080"

    networks:
      - polymarket-net

    restart: on-failure:5

    profiles:
      - all

networks:
  polymarket-net:
    driver: bridge

volumes:
  polymarket-data:
    driver: local
